reddit:
  # Path to reddit-skills directory (Chrome extension bridge)
  skills_dir: "/Users/mathias/Development/Projects/community-radar/scripts"

  domain_monitoring:
    enabled: true
    domains:
      - "purepoolpro.com"
    max_pages: 3
    sort: "new"

  # Tracked subreddits and sort methods
  # Add new subreddits to monitor for opportunities, sentiment, mentions, and competitors
  subreddits:
    PurePoolPro:
      name: "PurePoolPro"
      sorts:
        - new
        - hot
        - top?t=month
        - top?t=year
        - top?t=all
    billiards:
      name: "billiards"
      sorts:
        - new
        - hot
        - top?t=month
        - top?t=year
      # Tags for filtering opportunities and competitor mentions
      track_keywords:
        - "pure pool"
        - "ripstone"
        - "snooker"
        - "8 ball"
        - "9 ball"
        - "10 ball"
        - "physics"
        - "simulation"
    snooker:
      name: "snooker"
      sorts:
        - new
        - hot
        - top?t=month
        - top?t=year
      # Tags for filtering opportunities and competitor mentions
      track_keywords:
        - "pure pool"
        - "ripstone"
        - "billiards"
        - "pool"
        - "physics"
