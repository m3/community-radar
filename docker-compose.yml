version: '3.8'

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: community_radar
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: community_radar
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "127.0.0.1:5001:5001"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=postgresql://community_radar:password123@db:5432/community_radar
    command: ["python", "-m", "src.main", "dashboard"]

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - db
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=postgresql://community_radar:password123@db:5432/community_radar
    command: ["python", "src/queue_worker.py"]

volumes:
  pgdata:
